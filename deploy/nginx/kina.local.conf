# ============================================================
#  Kina · Nginx server block para servidor provisional (Bazzite/Fedora)
#  Colocar en:  /etc/nginx/conf.d/kina.local.conf
#  Luego:       sudo nginx -t && sudo systemctl reload nginx
#
#  Sirve Laravel desde /var/www/kina/public usando PHP-FPM por socket.
#  Pensado para LAN/staging (HTTP). Para acceso externo usa Tailscale/
#  Cloudflare Tunnel; NO abras este puerto a internet sin HTTPS + firewall.
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # Ajusta a tu IP LAN o nombre local (kina.local via /etc/hosts o mDNS).
    server_name kina.local 192.168.1.50 _;

    root /var/www/kina/public;
    index index.php;

    charset utf-8;

    # Límite de subida (fotos de perfil ~4 MB; deja algo de margen).
    client_max_body_size 8M;

    # Logs separados para esta app.
    access_log /var/log/nginx/kina.access.log;
    error_log  /var/log/nginx/kina.error.log;

    # Enrutado de Laravel: todo lo no-archivo va a index.php.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Favicon / robots sin ruido en logs.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Pasar PHP a PHP-FPM (socket por defecto en Fedora).
    # Verifica el socket real con:  sudo ss -lx | grep php
    #   Fedora suele usar:  /run/php-fpm/www.sock
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    # Negar acceso a archivos ocultos (.env, .git, etc.), salvo .well-known.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache ligero para assets compilados por Vite.
    location ^~ /build/ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }
}
